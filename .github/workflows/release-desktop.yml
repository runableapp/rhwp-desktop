name: Build Desktop Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "desktop-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils fakeroot rpm squashfs-tools

      - name: Install desktop deps
        run: npm ci

      - name: Install UI deps
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Prepare icons (base png)
        run: npm run prepare:icons

      - name: Prepare icons (Windows .ico)
        if: runner.os == 'Windows'
        run: node scripts/gen-win-ico.mjs

      - name: Prepare icons (macOS .icns)
        if: runner.os == 'macOS'
        run: ./scripts/gen-mac-icns.sh

      - name: Build desktop
        run: npm run build

      - name: Package (Linux AppImage)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux AppImage --publish never

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win nsis --publish never

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac dmg --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: |
            desktop/release/*.AppImage
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/latest*.yml

  create-release:
    name: Create GitHub Release (attach binaries)
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: "desktop-*"
          merge-multiple: true

      - name: List release files
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-artifacts || true
          echo "==> Found files:"
          find release-artifacts -type f -maxdepth 2 -print

      - name: Create/Update GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Desktop Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/latest*.yml

